version: '3.8'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
        VITE_SOCKET_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/watchtogether
      - JWT_SECRET=${JWT_SECRET:-WatchTogether2024SecretKey_ChangeThis}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5000
      - NODE_ENV=production
    depends_on:
      - mongodb

volumes:
  mongo_data:
